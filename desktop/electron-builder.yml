appId: com.emperor.agent.desktop
productName: Emperor Agent

directories:
  output: dist

files:
  - out/**/*
  - package.json

extraResources:
  - from: build/icon.png
    to: icon.png
  - from: ../templates
    to: runtime-defaults/templates
  - from: ../skills
    to: runtime-defaults/skills
  - from: ../assets
    to: runtime-defaults/assets
  - from: ../model_config.example.json
    to: runtime-defaults/model_config.example.json
  - from: ../mcp_config.example.json
    to: runtime-defaults/mcp_config.example.json
  - from: ../.env.example
    to: runtime-defaults/.env.example
  - from: src/pet
    to: desktop-pet
    filter:
      - renderer.html
      - renderer.css
      - renderer.js
      - preload.js
      - event-mapper.js
      - idle-scenes.js

asar: true

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.png
  artifactName: Emperor-Agent-${version}-mac-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: Emperor-Agent-${version}-win-${arch}.${ext}

linux:
  target:
    - AppImage
  icon: build/icon.png
  category: Utility
  artifactName: Emperor-Agent-${version}-linux-${arch}.${ext}

# Release builds host CoreApi in the Electron main process and copy runtime
# defaults into the user's app data directory on first launch.
