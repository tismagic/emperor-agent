<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Emperor Agent low-poly mascot</title>
  <desc id="desc">A playful low-poly imperial seal companion mascot for Emperor Agent.</desc>
  <defs>
    <style>
      .ink { fill: #151513; }
      .ink2 { fill: #24231f; }
      .jade { fill: #2f5f48; }
      .jade2 { fill: #3f7659; }
      .jade3 { fill: #6fa783; }
      .gold { fill: #c69b45; }
      .gold2 { fill: #e0b963; }
      .gold3 { fill: #8f6926; }
      .ivory { fill: #f4ead0; }
      .red { fill: #b84a2c; }
      .shadow { fill: #080808; opacity: .45; }
      .line { fill: none; stroke: #0a0a09; stroke-width: 5; stroke-linejoin: round; stroke-linecap: round; }
      .gold-line { fill: none; stroke: #c69b45; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
      .thin-gold { fill: none; stroke: #d6ad55; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
      .red-line { fill: none; stroke: #b84a2c; stroke-width: 3; stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="256" height="256" rx="24" class="ink" />

  <!-- low-poly ground -->
  <polygon class="shadow" points="54,223 91,212 166,214 208,223 181,235 83,235" />

  <!-- imperial hanging beads -->
  <g>
    <path class="thin-gold" d="M60 78 L60 121" />
    <circle class="gold2" cx="60" cy="87" r="5" />
    <circle class="jade3" cx="60" cy="102" r="5" />
    <circle class="gold" cx="60" cy="117" r="5" />
    <polygon class="red" points="55,124 65,124 69,141 60,135 51,141" />

    <path class="thin-gold" d="M196 78 L196 121" />
    <circle class="gold2" cx="196" cy="87" r="5" />
    <circle class="jade3" cx="196" cy="102" r="5" />
    <circle class="gold" cx="196" cy="117" r="5" />
    <polygon class="red" points="191,124 201,124 205,141 196,135 187,141" />
  </g>

  <!-- silly imperial cap / crown-frame, intentionally chunky -->
  <g>
    <polygon class="gold3" points="71,52 88,38 168,38 185,52 174,75 82,75" />
    <polygon class="gold" points="76,48 92,32 164,32 180,48 171,68 85,68" />
    <polygon class="gold2" points="92,32 164,32 151,49 105,49" />
    <polygon class="jade2" points="106,48 150,48 144,64 112,64" />
    <circle class="jade3" cx="128" cy="48" r="10" />
    <path class="line" d="M88 57 H113 M143 57 H168" />
  </g>

  <!-- body: imperial jade seal block -->
  <g>
    <polygon class="jade" points="61,75 195,75 210,94 205,187 182,211 74,211 51,187 46,94" />
    <polygon class="jade2" points="61,75 128,75 128,211 74,211 51,187 46,94" opacity=".58" />
    <polygon class="ink2" points="74,95 181,95 191,108 187,148 174,160 82,160 69,148 65,108" />
    <polygon class="gold" points="72,91 184,91 197,106 192,151 176,166 80,166 64,151 59,106" />
    <polygon class="ink" points="78,101 178,101 187,111 183,144 171,155 85,155 73,144 69,111" />
    <polygon class="jade3" points="57,83 89,83 69,99 49,96" opacity=".36" />
    <polygon class="gold3" points="51,187 74,211 98,211 76,194" />
    <polygon class="gold2" points="158,211 182,211 205,187 180,194" />
  </g>

  <!-- face: deadpan court-agent expression -->
  <g>
    <polygon class="ivory" points="96,115 106,108 116,115 116,136 106,143 96,136" />
    <polygon class="ivory" points="140,115 150,108 160,115 160,136 150,143 140,136" />
    <polygon class="gold" points="122,144 136,144 132,150 126,150" opacity=".75" />
  </g>

  <!-- chest: memory seal core -->
  <g>
    <polygon class="gold3" points="103,168 128,153 153,168 153,196 128,211 103,196" />
    <polygon class="gold" points="109,171 128,160 147,171 147,193 128,204 109,193" />
    <polygon class="ink2" points="116,175 128,168 140,175 140,189 128,196 116,189" />
    <circle class="jade3" cx="128" cy="182" r="8" />
    <circle class="red" cx="128" cy="182" r="3" />
  </g>

  <!-- agent cursor sleeve: the one irreverent "code" cue -->
  <g>
    <polygon class="gold3" points="196,135 227,119 231,136 217,150 199,157" />
    <polygon class="ivory" points="202,131 228,117 230,134 216,145 204,150" />
    <path class="gold-line" d="M204 151 L225 164" />
  </g>

  <!-- clumsy seal-stamp arm -->
  <g>
    <polygon class="jade2" points="45,144 29,158 36,177 58,169" />
    <polygon class="gold" points="27,157 43,143 53,154 37,181" />
    <path class="line" d="M37 162 L48 155" />
    <polygon class="red" points="30,174 43,178 39,190 26,186" />
    <path class="red-line" d="M31 179 L39 181 M34 175 L32 186" />
  </g>

  <!-- tiny feet, intentionally awkward -->
  <g>
    <polygon class="gold3" points="78,211 104,211 111,226 70,226" />
    <polygon class="gold" points="82,207 102,207 108,220 73,220" />
    <polygon class="gold3" points="152,211 178,211 186,226 145,226" />
    <polygon class="gold" points="154,207 174,207 182,220 147,220" />
  </g>

  <!-- low-poly highlights and goofy imperial details -->
  <g opacity=".9">
    <path class="thin-gold" d="M83 180 C91 175 96 175 102 180" />
    <path class="thin-gold" d="M154 180 C160 175 166 175 173 180" />
    <polygon class="gold2" points="59,75 72,75 64,87" opacity=".65" />
    <polygon class="jade3" points="184,80 197,96 190,120 176,91" opacity=".28" />
    <circle class="jade3" cx="179" cy="116" r="5" />
    <polygon class="red" points="170,178 182,178 182,190 170,190" />
    <path class="red-line" d="M173 181 H179 M173 186 H179 M176 180 V189" />
  </g>
</svg>
